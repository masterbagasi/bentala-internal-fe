<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spec Preview — Dynamic Socmed Projects</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0e0f13; color: #e6e7ea;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65; font-size: 15.5px;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 56px 28px 120px; }
  .bar {
    position: sticky; top: 0; z-index: 5; backdrop-filter: blur(8px);
    background: rgba(14,15,19,0.82); border-bottom: 1px solid #23252c;
    padding: 14px 28px; display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #9aa0ab;
  }
  .bar b { color: #e6e7ea; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #6c63ff; }
  .md h1 { font-size: 30px; line-height: 1.2; margin: 8px 0 18px; letter-spacing: -0.02em; }
  .md h2 { font-size: 21px; margin: 38px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #23252c; }
  .md h3 { font-size: 16.5px; margin: 26px 0 10px; color: #c7cad1; }
  .md p, .md li { color: #d2d5db; }
  .md a { color: #8b86ff; }
  .md code { background: #1a1c22; border: 1px solid #23252c; border-radius: 5px; padding: 1.5px 6px; font-size: 13px; color: #c9b8ff; }
  .md pre { background: #15171d; border: 1px solid #23252c; border-radius: 10px; padding: 14px 16px; overflow: auto; }
  .md pre code { background: none; border: none; padding: 0; color: #d2d5db; }
  .md blockquote { margin: 14px 0; padding: 6px 16px; border-left: 3px solid #6c63ff; background: #14151b; border-radius: 0 8px 8px 0; color: #b9bdc6; }
  .md table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14px; }
  .md th, .md td { border: 1px solid #23252c; padding: 8px 12px; text-align: left; }
  .md th { background: #15171d; color: #e6e7ea; }
  .md hr { border: none; border-top: 1px solid #23252c; margin: 32px 0; }
  .md ul, .md ol { padding-left: 22px; }
  .md li { margin: 4px 0; }
  .err { color: #ff8080; }
</style>
</head>
<body>
  <div class="bar"><span class="dot"></span> Spec preview · <b>2026-06-10-dynamic-socmed-projects-design.md</b></div>
  <div class="wrap"><div id="md" class="md">Memuat…</div></div>
<script>
  fetch('2026-06-10-dynamic-socmed-projects-design.md?ts=' + Date.now())
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(t => { document.getElementById('md').innerHTML = marked.parse(t); })
    .catch(e => { document.getElementById('md').innerHTML = '<p class="err">Gagal memuat spec: ' + e + '</p>'; });
</script>
</body>
</html>
